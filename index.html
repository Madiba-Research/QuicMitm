<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello from HTML File</title>
</head>
<body>
    <h1>Hello, world</h1>
    <p>This content is loaded from a file on the server.</p>
    <p>Every 5 second, the page will send a request to the server again</p>
    <p>Browser is using: <h2><span id="msg-data">Loading...</span></h2></p>
    <script>
        // Function to fetch data from the API every 10 seconds
        async function fetchData() {
            try {
                const response = await fetch('/testmsg');
                const data = await response.json();
                document.getElementById('msg-data').innerText = data.message;
            } catch (error) {
                console.error('Error fetching API data:', error);
            }
        }

        // Start fetching when the page loads
        window.onload = function() {
            fetchData();
            setInterval(fetchData, 5000);  // 10000ms = 10 seconds
        }
    </script>
</body>
</html>
